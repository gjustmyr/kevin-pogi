<aside
  [class.translate-x-0]="isOpen()"
  [class.-translate-x-full]="!isOpen()"
  class="fixed top-0 left-0 z-50 w-64 h-full transition-transform bg-white border-r border-gray-200"
>
  <div class="h-full flex flex-col">
    <!-- Logo/Brand -->
    <div class="flex-shrink-0 px-4 py-6 border-b border-gray-200">
      <div class="flex flex-col items-center">
        <img src="/assets/logo.png" alt="Logo" class="h-20 mb-3" />
        <h2 class="text-lg font-bold text-gray-900">Dean Portal</h2>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-3 py-4 overflow-y-auto">
      <ul class="space-y-1">
        <!-- Dashboard -->
        <li>
          <button
            (click)="selectTab('dashboard')"
            [class.bg-blue-50]="activeTab() === 'dashboard'"
            [class.text-blue-600]="activeTab() === 'dashboard'"
            [class.text-gray-700]="activeTab() !== 'dashboard'"
            class="flex items-center w-full px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors group"
          >
            <svg
              class="w-5 h-5 flex-shrink-0"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
              />
            </svg>
            <span class="ml-3 font-medium">Dashboard</span>
          </button>
        </li>

        <!-- Divider -->
        <li class="pt-3 pb-2">
          <div class="border-t border-gray-200"></div>
        </li>

        <!-- Faculty -->
        <li>
          <button
            (click)="selectTab('faculty')"
            [class.bg-blue-50]="activeTab() === 'faculty'"
            [class.text-blue-600]="activeTab() === 'faculty'"
            [class.text-gray-700]="activeTab() !== 'faculty'"
            class="flex items-center w-full px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors group"
          >
            <svg
              class="w-5 h-5 flex-shrink-0"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"
              />
            </svg>
            <span class="ml-3 font-medium">Faculty</span>
          </button>
        </li>

        <!-- Organization -->
        <li>
          <button
            (click)="selectTab('organization')"
            [class.bg-blue-50]="activeTab() === 'organization'"
            [class.text-blue-600]="activeTab() === 'organization'"
            [class.text-gray-700]="activeTab() !== 'organization'"
            class="flex items-center w-full px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors group"
          >
            <svg
              class="w-5 h-5 flex-shrink-0"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"
              />
            </svg>
            <span class="ml-3 font-medium">Organization</span>
          </button>
        </li>

        <!-- Accomplishments -->
        <li>
          <button
            (click)="selectTab('accomplishments')"
            [class.bg-blue-50]="activeTab() === 'accomplishments'"
            [class.text-blue-600]="activeTab() === 'accomplishments'"
            [class.text-gray-700]="activeTab() !== 'accomplishments'"
            class="flex items-center w-full px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors group"
          >
            <svg
              class="w-5 h-5 flex-shrink-0"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
              />
            </svg>
            <span class="ml-3 font-medium">Accomplishments</span>
          </button>
        </li>

        <!-- Credentials -->
        <li>
          <button
            (click)="selectTab('credentials')"
            [class.bg-blue-50]="activeTab() === 'credentials'"
            [class.text-blue-600]="activeTab() === 'credentials'"
            [class.text-gray-700]="activeTab() !== 'credentials'"
            class="flex items-center w-full px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors group"
          >
            <svg
              class="w-5 h-5 flex-shrink-0"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
              />
            </svg>
            <span class="ml-3 font-medium">Credentials</span>
          </button>
        </li>

        <!-- Divider with label -->
        <li class="pt-4 pb-2">
          <div class="px-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">
            Management
          </div>
        </li>

        <!-- Sections -->
        <li>
          <button
            (click)="selectTab('sections')"
            [class.bg-blue-50]="activeTab() === 'sections'"
            [class.text-blue-600]="activeTab() === 'sections'"
            [class.text-gray-700]="activeTab() !== 'sections'"
            class="flex items-center w-full px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors group"
          >
            <svg
              class="w-5 h-5 flex-shrink-0"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
              />
            </svg>
            <span class="ml-3 font-medium">Sections</span>
          </button>
        </li>

        <!-- Programs -->
        <li>
          <button
            (click)="selectTab('programs')"
            [class.bg-blue-50]="activeTab() === 'programs'"
            [class.text-blue-600]="activeTab() === 'programs'"
            [class.text-gray-700]="activeTab() !== 'programs'"
            class="flex items-center w-full px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors group"
          >
            <svg
              class="w-5 h-5 flex-shrink-0"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"
              />
            </svg>
            <span class="ml-3 font-medium">Programs</span>
          </button>
        </li>

        <!-- Courses -->
        <li>
          <button
            (click)="selectTab('courses')"
            [class.bg-blue-50]="activeTab() === 'courses'"
            [class.text-blue-600]="activeTab() === 'courses'"
            [class.text-gray-700]="activeTab() !== 'courses'"
            class="flex items-center w-full px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors group"
          >
            <svg
              class="w-5 h-5 flex-shrink-0"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"
              />
            </svg>
            <span class="ml-3 font-medium">Courses</span>
          </button>
        </li>
      </ul>
    </nav>
  </div>
</aside>
